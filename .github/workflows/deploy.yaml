name: Deploy Fullstack Messenger

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- BACKEND BUILD (Go) ---
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'

      - name: Build Go Backend
        # We specify the working directory here
        run: |
          cd backend
          GOOS=linux GOARCH=amd64 go build -o ${{ github.workspace }}/messenger-backend .
      # --- FRONTEND BUILD (Node) ---
      - name: Build Frontend
        env:
          VITE_TURN_SERVER: ${{ secrets.VITE_TURN_SERVER }}
          VITE_TURN_USERNAME: ${{ secrets.VITE_TURN_USERNAME }}
          VITE_TURN_PASSWORD: ${{ secrets.VITE_TURN_PASSWORD }}
        run: |
          cd frontend
          npm install
          npm run build
          # Move build to root for easier SCP transfer
          mv dist ${{ github.workspace }}/frontend-dist
      # --- DEPLOYMENT ---
      - name: Upload to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # We transfer the binary and the frontend folder from the root
          source: "messenger-backend,frontend-dist/*"
          target: "/home/ubuntu/deploy-tmp"

      - name: Production Swap & Restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Stop service
            sudo systemctl stop messenger-backend || true
            
            # Update Backend
            sudo mv /home/ubuntu/deploy-tmp/messenger-backend /usr/local/bin/messenger-backend
            sudo chmod +x /usr/local/bin/messenger-backend
            
            # Update Frontend
            sudo rm -rf /var/www/messenger/*
            sudo mv /home/ubuntu/deploy-tmp/frontend-dist/* /var/www/messenger/
            
            # Clean up temp
            rm -rf /home/ubuntu/deploy-tmp
            
            # Restart
            sudo systemctl start messenger-backend
            sudo systemctl reload nginx