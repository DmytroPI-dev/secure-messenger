name: Deploy Fullstack Messenger

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- BACKEND BUILD (Go) ---
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'

      - name: Build Go Backend
        # We specify the working directory here
        run: |
          cd backend
          GOOS=linux GOARCH=amd64 go build -o ${{ github.workspace }}/messenger-backend .
      # --- FRONTEND BUILD (Node) ---
      - name: Build Frontend
        env:
          VITE_TURN_SERVER: ${{ secrets.VITE_TURN_SERVER }}
          VITE_TURN_USERNAME: ${{ secrets.VITE_TURN_USERNAME }}
          VITE_TURN_PASSWORD: ${{ secrets.VITE_TURN_PASSWORD }}
        run: |
          cd frontend
          npm ci
          npm run build
          # Move build to root for easier SCP transfer
          mv dist ${{ github.workspace }}/frontend-dist
      # --- DEPLOYMENT ---
      - name: Upload to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # We transfer the binary and the frontend folder from the root
          source: "messenger-backend,frontend-dist"
          target: "/root/deploy-tmp"

      - name: Production Swap & Restart
        uses: appleboy/ssh-action@v1.0.3
        env:
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: CORS_ORIGIN
          script: |
            # Stop service
            systemctl stop messenger-backend || true

            # Update Backend
            mv /root/deploy-tmp/messenger-backend /usr/local/bin/messenger-backend
            chmod +x /usr/local/bin/messenger-backend

            # Set CORS_ORIGIN for the Oracle deployment via systemd drop-in
            mkdir -p /etc/systemd/system/messenger-backend.service.d
            printf '[Service]\nEnvironment="CORS_ORIGIN=%s"\n' "$CORS_ORIGIN" \
              > /etc/systemd/system/messenger-backend.service.d/cors.conf
            systemctl daemon-reload

            # Update Frontend
            rm -rf /var/www/messenger/*
            cp -r /root/deploy-tmp/frontend-dist/. /var/www/messenger/

            # Clean up temp
            rm -rf /root/deploy-tmp

            # Restart
            systemctl start messenger-backend
            systemctl reload nginx

            # Health check — wait up to 15s for the backend to accept connections
            for i in $(seq 1 15); do
              curl -sf http://localhost:8080/health && break
              sleep 1
            done